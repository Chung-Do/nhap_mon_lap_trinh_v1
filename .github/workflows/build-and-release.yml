name: Build RemotePC App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Client
      run: |
        echo "Building Client..."
        .\build_client.bat
      shell: cmd

    - name: Build Server
      run: |
        echo "Building Server..."
        .\build_server.bat
      shell: cmd

    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemotePC-Client
        path: dist/client/RemotePC-Client
        retention-days: 30

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemotePC-Server
        path: dist/server/RemotePC-Server
        retention-days: 30

    - name: Create Release Zip (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd dist\client
        Compress-Archive -Path RemotePC-Client -DestinationPath ..\..\RemotePC-Client.zip
        cd ..\..
        cd dist\server
        Compress-Archive -Path RemotePC-Server -DestinationPath ..\..\RemotePC-Server.zip
      shell: powershell

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          RemotePC-Client.zip
          RemotePC-Server.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
