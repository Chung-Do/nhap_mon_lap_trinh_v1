name: Build RemotePC App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Client
      run: |
        echo "Building Client..."
        .\build_client.bat
      shell: cmd

    - name: Build Server
      run: |
        echo "Building Server..."
        .\build_server.bat
      shell: cmd

    - name: Create Zip Files
      run: |
        cd dist\client
        Compress-Archive -Path RemotePC-Client -DestinationPath ..\..\RemotePC-Client.zip
        cd ..\..
        cd dist\server
        Compress-Archive -Path RemotePC-Server -DestinationPath ..\..\RemotePC-Server.zip
      shell: powershell

    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemotePC-Client
        path: RemotePC-Client.zip
        retention-days: 30

    - name: Upload Server Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RemotePC-Server
        path: RemotePC-Server.zip
        retention-days: 30

    - name: Update Latest Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Tự động build từ commit ${{ github.sha }}

          **Download:**
          - RemotePC-Client.zip: Client application
          - RemotePC-Server.zip: Server application
        files: |
          RemotePC-Client.zip
          RemotePC-Server.zip
        prerelease: false
        draft: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Tagged Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          RemotePC-Client.zip
          RemotePC-Server.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
